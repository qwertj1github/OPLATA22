<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата перевода</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f0f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 35px 25px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 { font-size: 22px; margin-bottom: 25px; color: #1d1d1f; }
        
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e5ea;
            border-radius: 14px;
            font-size: 17px;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus { border-color: #007aff; }
        
        .btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 15px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-outline {
            background: white;
            color: #007aff;
            border: 2px solid #007aff;
            margin-top: 10px;
        }
        
        .result { display: none; margin-top: 20px; }
        .masked-phone {
            font-size: 22px;
            font-weight: 600;
            background: #f2f2f7;
            padding: 8px 18px;
            border-radius: 12px;
            display: inline-block;
            margin: 10px 0;
            letter-spacing: 1px;
        }
        .amount-big {
            font-size: 42px;
            font-weight: 700;
            margin: 5px 0;
        }
        
        .qr-wrapper {
            margin: 20px auto;
            padding: 15px;
            background: white;
            border: 1px solid #e5e5ea;
            border-radius: 16px;
            display: inline-block;
        }
        canvas { display: block; }
        
        .error { color: #ff3b30; font-size: 13px; margin-top: 6px; display: none; }
        .hint { font-size: 12px; color: #8e8e93; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card" id="app">
    <!-- ЭКРАН 1: ВВОД ДАННЫХ -->
    <div id="screen1">
        <h2>Данные для перевода</h2>
        <div class="input-group">
            <label>Телефон (10 цифр без +7)</label>
            <input type="tel" id="phone" placeholder="9001234567" maxlength="10" inputmode="numeric">
            <div class="error" id="phoneError">Введите ровно 10 цифр</div>
        </div>
        <div class="input-group">
            <label>Сумма (₽)</label>
            <input type="number" id="amount" placeholder="590" value="590">
            <div class="error" id="amountError">Минимум 10 ₽</div>
        </div>
        <div class="input-group">
            <label>Банк получателя</label>
            <input type="text" id="bank" value="sberbank" placeholder="sberbank / tinkoff / vtb">
        </div>
        <button class="btn" id="generateBtn">Сгенерировать QR и ссылку</button>
        <div class="hint">Комиссия 0% · Безопасно · СБП</div>
    </div>

    <!-- ЭКРАН 2: QR И КНОПКА ОПЛАТЫ -->
    <div class="result" id="screen2">
        <div class="amount-big"><span id="showAmount">590</span> ₽</div>
        <div class="masked-phone" id="showPhone">+7 *** ***-**-**</div>
        
        <div class="qr-wrapper">
            <canvas id="qrCanvas" width="220" height="220"></canvas>
        </div>
        <p style="font-size:13px;color:#8e8e93;margin:5px 0;">Наведите камеру телефона</p>
        
        <a class="btn" id="payBtn" href="#" target="_blank" style="display:flex;align-items:center;justify-content:center;text-decoration:none;">
            💳 Оплатить через приложение
        </a>
        <button class="btn btn-outline" id="backBtn">← Назад</button>
        <div class="hint">Нажмите кнопку выше или отсканируйте QR</div>
    </div>
</div>

<script>
(function() {
    // Экраны
    const scr1 = document.getElementById('screen1');
    const scr2 = document.getElementById('screen2');
    
    // Поля ввода
    const phoneInp = document.getElementById('phone');
    const amountInp = document.getElementById('amount');
    const bankInp = document.getElementById('bank');
    
    // Ошибки
    const phoneErr = document.getElementById('phoneError');
    const amountErr = document.getElementById('amountError');
    
    // Кнопки
    const genBtn = document.getElementById('generateBtn');
    const backBtn = document.getElementById('backBtn');
    const payBtn = document.getElementById('payBtn');
    
    // Отображение
    const showAmount = document.getElementById('showAmount');
    const showPhone = document.getElementById('showPhone');
    const qrCanvas = document.getElementById('qrCanvas');
    
    let currentSbpLink = '';

    // ========== ГЕНЕРАЦИЯ QR БЕЗ БИБЛИОТЕКИ (чистый canvas) ==========
    function generateQRCode(url, size) {
        const canvas = qrCanvas;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, size, size);
        
        // Используем внешний API Google для генерации QR (надёжно и без библиотек)
        const img = new Image();
        img.crossOrigin = 'Anonymous';
        img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size + '&data=' + encodeURIComponent(url);
        
        img.onload = function() {
            ctx.drawImage(img, 0, 0, size, size);
        };
        img.onerror = function() {
            // Фолбэк — рисуем заглушку
            ctx.fillStyle = '#f0f0f5';
            ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#ff3b30';
            ctx.font = '14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('QR не загрузился', size/2, size/2 - 10);
            ctx.fillText('Проверьте интернет', size/2, size/2 + 20);
        };
    }

    // ========== МАСКИРОВКА ТЕЛЕФОНА ==========
    function maskPhone(phone) {
        if (phone.length === 10) {
            return '+7 ' + phone.substr(0,3) + ' ***-**-' + phone.substr(8,2);
        }
        return '+7 *** ***-**-**';
    }

    // ========== ПРОВЕРКИ ==========
    function validate() {
        let valid = true;
        const phone = phoneInp.value.trim();
        const amount = parseInt(amountInp.value, 10);
        
        if (phone.length !== 10 || !/^\d{10}$/.test(phone)) {
            phoneErr.style.display = 'block';
            valid = false;
        } else {
            phoneErr.style.display = 'none';
        }
        
        if (isNaN(amount) || amount < 10) {
            amountErr.style.display = 'block';
            valid = false;
        } else {
            amountErr.style.display = 'none';
        }
        
        return valid;
    }

    // ========== ГЕНЕРАЦИЯ ==========
    function generate() {
        if (!validate()) return;
        
        const phone = phoneInp.value.trim();
        const amount = amountInp.value.trim();
        const bank = bankInp.value.trim().toLowerCase() || 'sberbank';
        
        const fullPhone = '7' + phone;
        
        // Ссылка СБП
        currentSbpLink = 'https://qr.nspk.ru/transfer?bank=' + bank + '&phone=' + fullPhone + '&sum=' + amount + '&cur=RUB';
        
        // Отображаем данные
        showAmount.textContent = amount;
        showPhone.textContent = maskPhone(phone);
        
        // Генерируем QR (220x220)
        generateQRCode(currentSbpLink, 220);
        
        // Настраиваем кнопку оплаты
        payBtn.href = currentSbpLink;
        payBtn.target = '_blank';
        
        // Переключаем экраны
        scr1.style.display = 'none';
        scr2.style.display = 'block';
    }

    // ========== НАЗАД ==========
    function goBack() {
        scr2.style.display = 'none';
        scr1.style.display = 'block';
        currentSbpLink = '';
    }

    // ========== ОБРАБОТЧИК НА КНОПКУ ОПЛАТЫ (прямое открытие) ==========
    payBtn.addEventListener('click', function(e) {
        if (!currentSbpLink) {
            e.preventDefault();
            return;
        }
        // Пытаемся открыть приложение
        window.open(currentSbpLink, '_blank');
    });

    // ========== ПРИВЯЗКА СОБЫТИЙ ==========
    genBtn.addEventListener('click', generate);
    backBtn.addEventListener('click', goBack);
    
    // Enter в поле телефона или суммы тоже запускает генерацию
    phoneInp.addEventListener('keypress', function(e) { if (e.key === 'Enter') generate(); });
    amountInp.addEventListener('keypress', function(e) { if (e.key === 'Enter') generate(); });
    bankInp.addEventListener('keypress', function(e) { if (e.key === 'Enter') generate(); });
    
})();
</script>
</body>
</html>
