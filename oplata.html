<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата через СБП по номеру телефона</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            margin: 20px;
            transition: all 0.2s ease;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1d1d1f;
        }
        .amount {
            font-size: 42px;
            font-weight: 700;
            color: #1d1d1f;
            margin: 20px 0 5px;
            letter-spacing: -1px;
        }
        .currency {
            font-size: 20px;
            font-weight: 400;
            color: #86868b;
            margin-left: 4px;
        }
        .description {
            font-size: 16px;
            color: #6e6e73;
            margin-bottom: 30px;
            line-height: 1.4;
        }
        .qr-container {
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e5e5ea;
            display: inline-block;
            margin-bottom: 25px;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #86868b;
            font-size: 14px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #d2d2d7;
        }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }
        
        .btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s ease, transform 0.1s ease;
            margin: 10px 0;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-sizing: border-box;
        }
        .btn:hover { background: #0066d6; }
        .btn:active { transform: scale(0.98); }
        
        .btn-secondary {
            background: #f2f2f7;
            color: #007aff;
        }
        .btn-secondary:hover { background: #e5e5ea; }

        .phone {
            font-weight: 600;
            color: #1d1d1f;
            background: #f2f2f7;
            padding: 4px 12px;
            border-radius: 8px;
            letter-spacing: 0.5px;
        }
        .info-text {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Оплата перевода</h1>
        <div class="amount">
            <span id="displayAmount">590</span><span class="currency">₽</span>
        </div>
        <div class="description">
            Перевод на карту по номеру телефона<br>
            <span class="phone" id="displayPhone">+7 (900) 123-45-67</span>
        </div>

        <!-- Блок QR-кода СБП -->
        <div class="qr-container">
            <canvas id="qrCanvas"></canvas>
        </div>
        <div style="font-size: 14px; color: #86868b; margin-bottom: 10px;">
            Наведите камеру, чтобы оплатить через СБП
        </div>

        <div class="divider">или</div>

        <!-- Кнопка «Оплатить» (пытается открыть приложение банка через deep-link) -->
        <a href="#" class="btn" id="payButton">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            Оплатить картой
        </a>
        
        <div class="info-text">
            Вы будете перенаправлены в приложение вашего банка.<br>
            Комиссия 0% • Безопасный платёж
        </div>
    </div>

    <!-- Подключаем библиотеку для генерации QR-кода -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    
    <script>
        // ============================================================
        // НАСТРОЙКИ: ЗАМЕНИТЕ ДАННЫЕ НА СВОИ
        // ============================================================
        const phone = "79527760444";      // Номер телефона получателя (без +, только цифры)
        const bankName = "Tbank";      // Идентификатор банка (тинькофф: tinkoff, сбер: sberbank, втб: vtb и т.д.)
        const amount = "5900";             // Сумма к оплате
        const displayPhone = "+7 952 776 04 44; // Номер для красивого отображения
        // ============================================================

        // 1. ГЕНЕРАЦИЯ QR-КОДА ДЛЯ СБП
        function generateQR() {
            // Формат ссылки СБП согласно стандарту ЦБ РФ
            const sbpLink = `https://qr.nspk.ru/transfer?bank=${bankName}&phone=${phone}&sum=${amount}&cur=RUB`;
            
            const canvas = document.getElementById('qrCanvas');
            // Очищаем canvas перед генерацией
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            new QRious({
                element: canvas,
                value: sbpLink,
                size: 200,
                level: 'M',
                padding: 12,
                background: 'white',
                foreground: '#1d1d1f'
            });
        }

        // 2. ОБРАБОТЧИК НАЖАТИЯ НА КНОПКУ «ОПЛАТИТЬ»
        function setupPaymentButton() {
            document.getElementById('payButton').addEventListener('click', function(e) {
                e.preventDefault();
                
                // Пытаемся открыть универсальную ссылку СБП (deep-link)
                const deepLink = `https://qr.nspk.ru/transfer?bank=${bankName}&phone=${phone}&sum=${amount}&cur=RUB`;
                
                // Также формируем ссылку для прямого перевода в конкретный банк (фолбэк для Сбера)
                // Пример: sberbank://sbp/?phone=... (может отличаться в зависимости от банка)
                const bankLinks = {
                    "sberbank": `https://online.sberbank.ru/sbp/pay?phone=%2B${phone}&amount=${amount}`,
                    "tinkoff": `https://www.tinkoff.ru/collect/checkout/?sum=${amount}&phone=${phone}`,
                };
                
                // Пробуем открыть приложение банка
                window.location.href = deepLink;
                
                // Запасной вариант: если приложение не открылось за 2 секунды,
                // показываем инструкцию (можно раскомментировать для десктопа)
                // setTimeout(() => {
                //     alert('Не удалось открыть приложение банка. Пожалуйста, отсканируйте QR-код или воспользуйтесь мобильным приложением.');
                // }, 2000);
            });
        }

        // 3. ОТОБРАЖЕНИЕ ДАННЫХ НА СТРАНИЦЕ
        document.getElementById('displayAmount').textContent = amount;
        document.getElementById('displayPhone').textContent = displayPhone;

        // Запускаем функции после загрузки страницы
        window.onload = function() {
            generateQR();
            setupPaymentButton();
            console.log('Платёжная страница готова. Ссылка СБП сгенерирована на телефон:', phone);
        };
    </script>
</body>
</html>
